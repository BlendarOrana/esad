version: '3.8'

services:
  postgres:
    image: postgres:18-alpine   
    container_name: Esad
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 1234 
      POSTGRES_DB: Esad
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  pgdata: